name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v"
        required: true
        default: "0.1.0-beta.1"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Smoke tests
        run: dotnet run --project SmokeTests\FreewriteWindows.SmokeTests.csproj --configuration Release

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: .\scripts\package-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Freewrite Windows v${{ steps.version.outputs.version }}
          draft: true
          prerelease: true
          files: |
            release/FreewriteWindows-v${{ steps.version.outputs.version }}-win-x64.zip
            release/FreewriteWindows-v${{ steps.version.outputs.version }}-win-x64.zip.sha256
